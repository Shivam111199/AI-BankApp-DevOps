apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  namespace: bankapp
  labels:
    app: mysql
spec:
  strategy:
    type: Recreate # Their is rollback and rollout stratgies - recreate will delete current one and create one & rolling is that don't delete old one till new one get creates , by default it is rolling
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
          - name: MYSQL_DATABASE
            valueFrom:
              configMapKeyRef:
                name: bankapp-config-map
                key: MYSQL_DATABASE
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: bankapp-secrets
                key: MYSQL_ROOT_PASSWORD
        volumeMounts:
          - name: mysql-storage
            mountPath: /var/lib/mysql
        readinessProbe:
          exec:             # It is an healthcheck of mysql server to get the status exec is for run command
            command: ["mysqladmin", "ping", "-h", "localhost"]
          initialDelaySeconds: 15
          periodSeconds: 10    
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc

