apiVersion: autoscaling/v2          # Use the autoscaling/v2 API (supports multiple metrics and scaling policies)
kind: HorizontalPodAutoscaler       # Resource type – automatically scales the number of pods
metadata:
  name: bankapp-hpa                 # Name of the HPA object
  namespace: bankapp                # Namespace where the target deployment exists
spec:
  scaleTargetRef:                   # Reference to the resource to scale
    apiVersion: apps/v1             # API version of the target resource
    kind: Deployment                # Type of resource (Deployment, StatefulSet, etc.)
    name: bankapp                   # Name of the target Deployment (must match metadata.name in the Deployment)
  minReplicas: 2                    # Minimum number of pods to run (never scale below this)
  maxReplicas: 4                    # Maximum number of pods to run (never scale above this)
  metrics:                          # Conditions that trigger scaling
    - type: Resource                # Metric type based on resource usage (CPU/memory)
      resource:
        name: cpu                   # The resource to monitor (cpu or memory)
        target:
          type: Utilization         # How to interpret the value – Utilization (percentage of request) or AverageValue
          averageUtilization: 70    # Target average CPU utilization across all pods (scales when >70%)
  behavior:                         # Fine‑tunes scaling speed and stabilisation
    scaleUp:
      stabilizationWindowSeconds: 30  # Wait 30 seconds after conditions are met before scaling up (avoids flapping)
      policies:
        - type: Pods                # Policy type – can be Pods or Percent
          value: 2                  # Add up to 2 pods per scaling event
          periodSeconds: 60         # Only apply this policy once every 60 seconds
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes after conditions are met before scaling down (conservative)
      policies:
        - type: Pods
          value: 1                  # Remove at most 1 pod per scaling event
          periodSeconds: 60         # Only apply this policy once every 60 seconds
